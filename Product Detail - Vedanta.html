<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Product Detail - Vedanta</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: #050508;
      color: #FFFFFF;
      overflow-x: hidden;
      padding-bottom: 20px;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 20% 40%, rgba(212,175,55,0.08), transparent 70%);
      pointer-events: none;
      z-index: -1;
    }

    .container { width: 100%; max-width: 100%; margin: 0; padding: 0; }

    /* ========== PERMANENT FLOATING CART ========== */
    .floating-cart {
      position: fixed;
      bottom: 100px;
      left: 16px;
      z-index: 1001;
      cursor: pointer;
      transition: 0.3s;
    }
    .cart-icon-container {
      background: linear-gradient(135deg, #D4AF37, #FF8C00);
      width: 55px;
      height: 55px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      box-shadow: 0 0 20px rgba(212,175,55,0.5);
    }
    .cart-icon-container i {
      font-size: 26px;
      color: #050508;
    }
    .cart-count {
      position: absolute;
      top: -6px;
      right: -6px;
      background: #FF4500;
      color: white;
      font-size: 11px;
      font-weight: bold;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Cart Sidebar */
    .cart-sidebar {
      position: fixed;
      top: 0;
      left: -100%;
      width: 85%;
      max-width: 380px;
      height: 100%;
      background: rgba(10,10,18,0.98);
      backdrop-filter: blur(20px);
      z-index: 2000;
      transition: 0.3s;
      border-right: 1px solid rgba(212,175,55,0.3);
      display: flex;
      flex-direction: column;
    }
    .cart-sidebar.open { left: 0; }
    .cart-header {
      padding: 20px;
      border-bottom: 1px solid rgba(212,175,55,0.3);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .cart-header h3 { font-size: 20px; color: #D4AF37; }
    .close-cart {
      background: none;
      border: none;
      color: white;
      font-size: 28px;
      cursor: pointer;
    }
    .cart-items {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }
    .cart-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .cart-item-info h4 { font-size: 14px; margin-bottom: 4px; }
    .cart-item-info p { color: #D4AF37; font-weight: bold; font-size: 14px; }
    .cart-item-remove {
      background: rgba(255,69,0,0.2);
      border: none;
      color: #FF4500;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      cursor: pointer;
    }
    .cart-footer {
      padding: 20px;
      border-top: 1px solid rgba(212,175,55,0.3);
    }
    .cart-total {
      display: flex;
      justify-content: space-between;
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 16px;
    }
    .checkout-btn {
      width: 100%;
      background: linear-gradient(135deg, #D4AF37, #FF8C00);
      border: none;
      padding: 14px;
      border-radius: 50px;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
    }
    .empty-cart { text-align: center; padding: 40px; color: #888; }
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      z-index: 1999;
      display: none;
    }
    .overlay.show { display: block; }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px;
      border-bottom: 1px solid rgba(212,175,55,0.3);
      background: rgba(5,5,8,0.95);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo h1 { font-size: 22px; font-weight: 800; background: linear-gradient(135deg, #FFF8E7, #D4AF37, #FF8C00); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .back-btn { background: rgba(212,175,55,0.15); border: 1px solid rgba(212,175,55,0.3); padding: 8px 16px; border-radius: 40px; color: #D4AF37; text-decoration: none; font-size: 13px; font-weight: 600; cursor: pointer; }

    .swipe-indicator { background: rgba(0,0,0,0.5); padding: 8px; text-align: center; font-size: 11px; color: #D4AF37; display: flex; justify-content: center; gap: 20px; }

    .product-gallery { background: rgba(15,15,22,0.6); padding: 20px; }
    .main-image {
      background: #0E0E14;
      border-radius: 28px;
      height: 380px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .main-image i { font-size: 160px; color: #D4AF37; }
    .badge {
      position: absolute;
      top: 16px;
      left: 16px;
      background: #FF4500;
      padding: 6px 14px;
      border-radius: 30px;
      font-size: 12px;
      font-weight: 800;
    }
    .thumbnail-list { display: flex; gap: 12px; justify-content: center; margin-top: 16px; }
    .thumbnail {
      width: 65px;
      height: 65px;
      background: #1A1A1A;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border: 2px solid transparent;
    }
    .thumbnail.active { border-color: #D4AF37; }
    .thumbnail i { font-size: 30px; color: #D4AF37; }

    .product-info {
      background: rgba(15,15,22,0.6);
      padding: 20px;
      margin: 16px;
      border-radius: 28px;
    }
    .product-brand { color: #D4AF37; font-size: 12px; letter-spacing: 2px; margin-bottom: 8px; }
    .product-name { font-size: 24px; font-weight: 700; margin-bottom: 12px; }
    .rating { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
    .stars { color: #FFB800; font-size: 14px; letter-spacing: 2px; }
    .review-count { color: #888; font-size: 12px; }
    .price-section { margin-bottom: 16px; }
    .current-price { font-size: 32px; font-weight: 800; color: #D4AF37; }
    .original-price { font-size: 18px; color: #888; text-decoration: line-through; margin-left: 10px; }
    .discount { background: #FF4500; padding: 4px 10px; border-radius: 25px; font-size: 12px; font-weight: 600; margin-left: 10px; }
    .offer-tag { background: rgba(212,175,55,0.1); padding: 12px; border-radius: 16px; margin: 16px 0; text-align: center; font-size: 13px; }
    .description { color: #CCCCCC; line-height: 1.6; font-size: 14px; margin: 16px 0; }

    .quantity-selector { display: flex; align-items: center; gap: 15px; margin: 20px 0; }
    .qty-btn {
      background: rgba(212,175,55,0.15);
      border: 1px solid rgba(212,175,55,0.3);
      width: 44px;
      height: 44px;
      border-radius: 14px;
      font-size: 20px;
      font-weight: bold;
      cursor: pointer;
      color: #D4AF37;
    }
    .qty-input {
      background: rgba(0,0,0,0.5);
      border: 1px solid rgba(212,175,55,0.3);
      width: 60px;
      height: 44px;
      text-align: center;
      font-size: 18px;
      font-weight: bold;
      color: white;
      border-radius: 14px;
    }

    .action-buttons { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }
    .add-cart-btn {
      width: 100%;
      background: rgba(212,175,55,0.15);
      border: 1px solid rgba(212,175,55,0.5);
      padding: 15px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 15px;
      color: #D4AF37;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      cursor: pointer;
    }
    .buy-btn {
      width: 100%;
      background: linear-gradient(135deg, #FF4500, #FF8C00);
      border: none;
      padding: 15px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 15px;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      cursor: pointer;
    }

    .section-title { font-size: 20px; font-weight: 700; margin: 24px 16px 16px; display: flex; align-items: center; gap: 10px; }
    .section-title span { background: #D4AF37; width: 30px; height: 3px; }

    .related-products {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      padding: 0 16px;
      margin-bottom: 30px;
    }
    .related-card {
      background: rgba(15,15,22,0.6);
      border-radius: 20px;
      padding: 12px;
      cursor: pointer;
    }
    .related-img {
      height: 140px;
      background: #0E0E14;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 10px;
    }
    .related-img i { font-size: 55px; color: #D4AF37; }
    .related-name { font-size: 13px; font-weight: 600; }
    .related-price { font-size: 15px; font-weight: 800; color: #D4AF37; }

    .reviews-section { padding: 0 16px; margin-bottom: 40px; }
    .review-card {
      background: rgba(15,15,22,0.4);
      border-radius: 20px;
      padding: 16px;
      margin-bottom: 12px;
    }
    .reviewer { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 600; margin-bottom: 8px; }
    .review-stars-small { color: #FFB800; font-size: 11px; margin-bottom: 8px; }
    .review-text { font-size: 12px; line-height: 1.5; color: #CCCCCC; }
    .review-date { font-size: 10px; color: #888; margin-top: 8px; }

    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #D4AF37;
      color: #050508;
      padding: 10px 20px;
      border-radius: 50px;
      font-weight: bold;
      z-index: 10000;
      font-size: 12px;
      display: none;
    }
    .toast.show { display: block; animation: fadeInOut 2s ease; }
    @keyframes fadeInOut {
      0% { opacity: 0; transform: translateX(-50%) translateY(10px); }
      15% { opacity: 1; transform: translateX(-50%) translateY(0); }
      100% { opacity: 0; transform: translateX(-50%) translateY(-10px); }
    }
  </style>
</head>
<body>

<!-- PERMANENT FLOATING CART (SAME AS INDEX.HTML) -->
<div class="floating-cart" id="floatingCart">
  <div class="cart-icon-container">
    <i class="fas fa-shopping-cart"></i>
    <span class="cart-count" id="cartCount">0</span>
  </div>
</div>

<!-- CART SIDEBAR -->
<div class="overlay" id="cartOverlay"></div>
<div class="cart-sidebar" id="cartSidebar">
  <div class="cart-header">
    <h3><i class="fas fa-shopping-bag"></i> Your Cart</h3>
    <button class="close-cart" id="closeCartBtn">&times;</button>
  </div>
  <div class="cart-items" id="cartItems">
    <div class="empty-cart">🛒 Your cart is empty</div>
  </div>
  <div class="cart-footer">
    <div class="cart-total">
      <span>Total:</span>
      <span id="cartTotal">₹0</span>
    </div>
    <button class="checkout-btn" id="checkoutBtn">💰 Proceed to Checkout</button>
  </div>
</div>

<div class="container" id="app"></div>
<div class="toast" id="toast"></div>

<script>
  const allProducts = [
    { id:1, name:"Banarasi Silk Saree", category:"Saree", price:8999, originalPrice:14999, icon:"fa-female", badge:"Best Seller", rating:4.9, reviewCount:1243, description:"Handwoven Banarasi silk saree with intricate zari work. Perfect for weddings and festive occasions." },
    { id:2, name:"Men's Cotton Kurta", category:"Kurta", price:1299, originalPrice:2499, icon:"fa-male", badge:"Trending", rating:4.7, reviewCount:892, description:"Premium cotton kurta with chikan embroidery. Breathable fabric, perfect for daily wear." },
    { id:3, name:"Women's Georgette Suit", category:"Suit", price:2499, originalPrice:4999, icon:"fa-female", badge:"New", rating:4.8, reviewCount:567, description:"Beautiful georgette suit set with dupatta. Lightweight and elegant for parties." },
    { id:4, name:"Graphic T-Shirt", category:"TShirt", price:499, originalPrice:999, icon:"fa-tshirt", badge:"Sale", rating:4.5, reviewCount:2341, description:"Premium cotton graphic t-shirt. Modern design, perfect for casual wear." },
    { id:5, name:"Slim Fit Jeans", category:"Jeans", price:799, originalPrice:1599, icon:"fa-shopping-bag", badge:"Popular", rating:4.4, reviewCount:1567, description:"Stretchable slim fit jeans with premium denim quality." },
    { id:6, name:"Amethyst Crystal", category:"Crystal", price:2899, originalPrice:4999, icon:"fa-gem", badge:"Healing", rating:4.9, reviewCount:432, description:"Natural amethyst geode crystal. Brings positive energy and peace." },
    { id:7, name:"Sandalwood Mala", category:"Mala", price:1299, originalPrice:2499, icon:"fa-hands-praying", badge:"Organic", rating:4.8, reviewCount:678, description:"108 sandalwood mala beads for meditation and prayer." },
    { id:8, name:"Tibetan Singing Bowl", category:"Meditation", price:1999, originalPrice:3999, icon:"fa-music", badge:"Therapy", rating:4.9, reviewCount:345, description:"Authentic Tibetan singing bowl for sound healing meditation." }
  ];

  const urlParams = new URLSearchParams(window.location.search);
  let currentProductId = parseInt(urlParams.get('id')) || 1;
  let currentProduct = allProducts.find(p => p.id === currentProductId) || allProducts[0];
  let quantity = 1;
  
  // ========== CART SYSTEM (SAME AS INDEX.HTML) ==========
  let cart = JSON.parse(localStorage.getItem('vedantaCart')) || [];
  
  function saveCart() { localStorage.setItem('vedantaCart', JSON.stringify(cart)); updateCartUI(); }
  
  function addToCart(product, qty) {
    const existing = cart.find(item => item.id === product.id);
    if (existing) existing.quantity += qty;
    else cart.push({ id: product.id, name: product.name, price: product.price, quantity: qty });
    saveCart();
    showToast(`🛍️ ${product.name} added to cart!`);
  }
  
  function removeFromCart(productId) {
    cart = cart.filter(item => item.id !== productId);
    saveCart();
  }
  
  function updateCartUI() {
    const cartCountSpan = document.getElementById('cartCount');
    const cartItemsDiv = document.getElementById('cartItems');
    const cartTotalSpan = document.getElementById('cartTotal');
    const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
    if (cartCountSpan) cartCountSpan.innerText = totalItems;
    if (!cartItemsDiv) return;
    if (cart.length === 0) {
      cartItemsDiv.innerHTML = '<div class="empty-cart">🛒 Your cart is empty</div>';
      if (cartTotalSpan) cartTotalSpan.innerText = '₹0';
      return;
    }
    let total = 0;
    cartItemsDiv.innerHTML = '';
    cart.forEach(item => {
      const itemTotal = item.price * item.quantity;
      total += itemTotal;
      cartItemsDiv.innerHTML += `
        <div class="cart-item">
          <div class="cart-item-info"><h4>${item.name}</h4><p>₹${item.price} x ${item.quantity} = ₹${itemTotal}</p></div>
          <button class="cart-item-remove" data-id="${item.id}">Remove</button>
        </div>
      `;
    });
    cartItemsDiv.querySelectorAll('.cart-item-remove').forEach(btn => {
      btn.addEventListener('click', () => removeFromCart(parseInt(btn.dataset.id)));
    });
    if (cartTotalSpan) cartTotalSpan.innerText = `₹${total}`;
  }
  
  function openCart() {
    document.getElementById('cartSidebar').classList.add('open');
    document.getElementById('cartOverlay').classList.add('show');
  }
  
  function closeCart() {
    document.getElementById('cartSidebar').classList.remove('open');
    document.getElementById('cartOverlay').classList.remove('show');
  }
  
  function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.innerText = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2500);
  }
  
  // ========== BUY NOW FUNCTION - GO TO CHECKOUT PAGE ==========
  function buyNow(product, qty) {
    const existing = cart.find(item => item.id === product.id);
    if (existing) existing.quantity += qty;
    else cart.push({ id: product.id, name: product.name, price: product.price, quantity: qty });
    saveCart();
    showToast(`🛍️ ${product.name} added! Redirecting to checkout...`);
    setTimeout(() => {
      window.location.href = 'file:///C:/Users/Sanjeshkar/OneDrive/Documents/Secure%20Checkout%20-%20Vedanta.html';
    }, 800);
  }

  function renderPage() {
    const discountPercent = Math.round(((currentProduct.originalPrice - currentProduct.price) / currentProduct.originalPrice) * 100);
    const reviews = [
      { name: "Priya Sharma", rating: 5, text: "Absolutely stunning product! Worth every penny!", date: "15 Mar 2025", verified: true },
      { name: "Rohan Mehta", rating: 5, text: "Very happy with my purchase. Fast shipping!", date: "10 Mar 2025", verified: true },
      { name: "Anjali Nair", rating: 4, text: "Good quality product. Customer service was helpful.", date: "5 Mar 2025", verified: false },
      { name: "Vikram Singh", rating: 5, text: "Amazing! Will definitely buy again.", date: "28 Feb 2025", verified: true }
    ];
    
    const html = `
      <div class="header">
        <div class="logo"><h1>VEDANTA</h1></div>
        <div class="back-btn" onclick="window.location.href='index.html'"><i class="fas fa-arrow-left"></i> Back</div>
      </div>
      <div class="swipe-indicator">
        <span><i class="fas fa-arrow-left"></i> Swipe → Previous</span>
        <span><i class="fas fa-arrow-right"></i> Swipe ← Next</span>
      </div>
      <div class="product-gallery">
        <div class="main-image"><div class="badge">${currentProduct.badge}</div><i class="fas ${currentProduct.icon}" id="mainIcon"></i></div>
        <div class="thumbnail-list" id="thumbnailList">
          ${[currentProduct.icon, 'fa-gem', 'fa-crown', 'fa-star'].map((icon, idx) => `<div class="thumbnail ${idx === 0 ? 'active' : ''}" data-icon="${icon}"><i class="fas ${icon}"></i></div>`).join('')}
        </div>
      </div>
      <div class="product-info">
        <div class="product-brand">VEDANTA EXCLUSIVE</div>
        <div class="product-name">${currentProduct.name}</div>
        <div class="rating"><div class="stars">${'★'.repeat(Math.floor(currentProduct.rating))}${'☆'.repeat(5 - Math.floor(currentProduct.rating))}</div><div class="review-count">${currentProduct.reviewCount} reviews</div></div>
        <div class="price-section"><span class="current-price">₹${currentProduct.price.toLocaleString('en-IN')}</span><span class="original-price">₹${currentProduct.originalPrice.toLocaleString('en-IN')}</span><span class="discount">${discountPercent}% OFF</span></div>
        <div class="offer-tag"><i class="fas fa-tags"></i> Limited Time Deal • Free Shipping + COD Available</div>
        <div class="description">${currentProduct.description}</div>
        <div class="quantity-selector"><button class="qty-btn" id="qtyMinus">-</button><input type="text" class="qty-input" id="qtyInput" value="1" readonly><button class="qty-btn" id="qtyPlus">+</button></div>
        <div class="action-buttons">
          <button class="add-cart-btn" id="addToCartBtn"><i class="fa-regular fa-bag-shopping"></i> ADD TO CART</button>
          <button class="buy-btn" id="buyNowBtn"><i class="fas fa-bolt"></i> BUY NOW</button>
        </div>
      </div>
      <div class="section-title"><span></span> You May Also Like</div>
      <div class="related-products" id="relatedProducts"></div>
      <div class="section-title"><span></span> Customer Reviews</div>
      <div class="reviews-section">${reviews.map(r => `<div class="review-card"><div class="reviewer"><i class="fas fa-user-circle" style="color:#D4AF37;"></i> ${r.name} ${r.verified ? '<span style="background:rgba(76,175,80,0.15); padding:2px 8px; border-radius:20px; font-size:9px; color:#4CAF50;">Verified</span>' : ''}</div><div class="review-stars-small">${'★'.repeat(r.rating)}${'☆'.repeat(5 - r.rating)}</div><div class="review-text">"${r.text}"</div><div class="review-date">${r.date}</div></div>`).join('')}</div>
    `;
    document.getElementById('app').innerHTML = html;
    
    let qty = 1;
    document.getElementById('qtyMinus')?.addEventListener('click', () => { if (qty > 1) { qty--; document.getElementById('qtyInput').value = qty; } });
    document.getElementById('qtyPlus')?.addEventListener('click', () => { qty++; document.getElementById('qtyInput').value = qty; });
    
    document.getElementById('addToCartBtn')?.addEventListener('click', () => addToCart(currentProduct, qty));
    document.getElementById('buyNowBtn')?.addEventListener('click', () => buyNow(currentProduct, qty));
    
    document.querySelectorAll('.thumbnail').forEach(thumb => {
      thumb.addEventListener('click', () => {
        document.querySelectorAll('.thumbnail').forEach(t => t.classList.remove('active'));
        thumb.classList.add('active');
        document.getElementById('mainIcon').className = `fas ${thumb.dataset.icon}`;
      });
    });
    
    const related = allProducts.filter(p => p.category === currentProduct.category && p.id !== currentProduct.id).slice(0, 4);
    document.getElementById('relatedProducts').innerHTML = related.map(p => `<div class="related-card" onclick="window.location.href='product-detail.html?id=${p.id}'"><div class="related-img"><i class="fas ${p.icon}"></i></div><div class="related-name">${p.name}</div><div class="related-price">₹${p.price.toLocaleString('en-IN')}</div></div>`).join('');
  }

  // Swipe navigation
  let touchStartX = 0, touchEndX = 0;
  function prevProduct() { let newId = currentProductId > 1 ? currentProductId - 1 : allProducts.length; window.location.href = `product-detail.html?id=${newId}`; }
  function nextProduct() { let newId = currentProductId < allProducts.length ? currentProductId + 1 : 1; window.location.href = `product-detail.html?id=${newId}`; }
  document.body.addEventListener('touchstart', (e) => { touchStartX = e.changedTouches[0].screenX; });
  document.body.addEventListener('touchend', (e) => {
    touchEndX = e.changedTouches[0].screenX;
    const diff = touchEndX - touchStartX;
    if (Math.abs(diff) > 40) diff > 0 ? prevProduct() : nextProduct();
  });
  
  // Cart UI Events
  document.getElementById('floatingCart')?.addEventListener('click', openCart);
  document.getElementById('closeCartBtn')?.addEventListener('click', closeCart);
